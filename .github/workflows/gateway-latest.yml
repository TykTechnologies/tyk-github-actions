# yamllint disable rule:line-length
---
name: Gateway latest tests

on:  # yamllint disable-line rule:truthy
  workflow_call:

    # Require GitHub App credentials to generate tokens for private repositories.
    secrets:
      PROBE_APP_ID:
        required: true
      PROBE_APP_PRIVATE_KEY:
        required: true

concurrency:
  group: ${{ github.head_ref || github.run_id }}-latest
  cancel-in-progress: true

jobs:
  preflight:
    uses: TykTechnologies/tyk-github-actions/.github/workflows/reuse-preflight.yml@main
    with:
      release: "latest"
    secrets:
      PROBE_APP_ID: ${{ secrets.PROBE_APP_ID }}
      PROBE_APP_PRIVATE_KEY: ${{ secrets.PROBE_APP_PRIVATE_KEY }}

  test:
    uses: TykTechnologies/tyk-github-actions/.github/workflows/reuse-test.yml@main
    with:
      release: "latest"
    secrets:
      PROBE_APP_ID: ${{ secrets.PROBE_APP_ID }}
      PROBE_APP_PRIVATE_KEY: ${{ secrets.PROBE_APP_PRIVATE_KEY }}
